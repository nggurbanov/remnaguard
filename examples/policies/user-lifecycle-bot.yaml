# Intended client: bot that creates and updates users in one tenant namespace.
# Expected allowed routes: POST/PATCH /api/users, selected user action routes, HWID writes.
# Expected denied routes: bulk user routes, squads, nodes, hosts, token/admin routes.
# Tradeoff: restricted writes require write_safety.single_writer and post-write verification.
tokens:
  - id: user-lifecycle-bot
    scopes:
      - users:read
      - users:create
      - users:update
      - users:action
      - hwid:read
      - hwid:write
    constraints:
      username_prefix: "tenant-a-"
      email_domains:
        - "example.com"
      allowed_internal_squads:
        - "00000000-0000-0000-0000-000000000001"
      allowed_external_squads:
        - "00000000-0000-0000-0000-000000000101"
      allowed_subscription_page_configs:
        - "00000000-0000-0000-0000-000000000201"
      max_traffic_limit_bytes: 1099511627776
      forbid_unlimited_traffic: true
      max_description_length: 256
      allowed_request_fields:
        user.create:
          - username
          - email
          - telegramId
          - description
          - trafficLimitBytes
          - trafficLimitStrategy
          - activeInternalSquads
          - externalSquadUuid
          - subscriptionPageConfigUuid
        user.update:
          - uuid
          - email
          - description
          - trafficLimitBytes
          - trafficLimitStrategy
          - activeInternalSquads
          - externalSquadUuid
          - subscriptionPageConfigUuid
    credentials:
      - id: user-lifecycle-bot-credential
        hmac_sha256: "replace-with-remnaguard-token-generate-digest"
