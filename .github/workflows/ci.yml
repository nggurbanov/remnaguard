name: ci

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - run: go test ./...
      - run: go test -race ./...
      - run: go test ./internal/httputil -fuzz=Fuzz -fuzztime=10s
      - run: go test ./internal/jsonpolicy -fuzz=Fuzz -fuzztime=10s
      - run: go vet ./...
      - run: go run ./cmd/remnaguard routes check-openapi --spec internal/routes/testdata/remnawave-2.7.4-openapi-min.json --strict

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - uses: golangci/golangci-lint-action@v8
